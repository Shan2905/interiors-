services:
  - type: web
    name: yedukondalu-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false        # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # set to your Vercel URL after deploy
